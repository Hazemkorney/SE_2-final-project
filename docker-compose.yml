version: "3.8"

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "${SA_PASSWORD}"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test:
        ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $$SA_PASSWORD -C -Q 'SELECT 1' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 18
      start_period: 30s

  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    user: root
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      SA_PASSWORD: "${SA_PASSWORD}"
    volumes:
      - ./docker/sql/init-databases.sql:/init.sql:ro
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        exec /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P "$$SA_PASSWORD" -C -i /init.sql
    restart: "no"

  eureka-server:
    build: ./eureka-server
    ports:
      - "8761:8761"
    depends_on:
      - sqlserver

  auth-service:
    build: ./auth-service
    ports:
      - "8081:8081"
    depends_on:
      sqlserver-init:
        condition: service_completed_successfully
      eureka-server:
        condition: service_started
      sqlserver:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://sqlserver:1433;databaseName=auth_db;trustServerCertificate=true
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - JWT_SECRET=${JWT_SECRET}
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN}

  main-service:
    build: ./main-service
    ports:
      - "8082:8082"
    depends_on:
      sqlserver-init:
        condition: service_completed_successfully
      eureka-server:
        condition: service_started
      auth-service:
        condition: service_started
      sqlserver:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://sqlserver:1433;databaseName=main_db;trustServerCertificate=true
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - JWT_SECRET=${JWT_SECRET}
      - AUTH_SERVICE_URL=http://auth-service:8081
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN}

  api-gateway:
    build: ./api-gateway
    ports:
      - "${API_GATEWAY_HOST_PORT:-8080}:8080"
    depends_on:
      - eureka-server
      - auth-service
      - main-service
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - JWT_SECRET=${JWT_SECRET}

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=${VITE_API_URL}
    depends_on:
      - api-gateway

volumes:
  sqldata:
